services:
  - type: web
    name: zapquiz
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zapquiz-db
          property: connectionString

databases:
  - name: zapquiz-db
    plan: free
