<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBattle - สนุกกับการเรียนรู้แบบ Real-time!</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="landing-page">

  <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">TH/EN</button>

  <main class="landing-container">
    <div class="animated-bg">
      <div class="bg-shape bg-shape--1"></div>
      <div class="bg-shape bg-shape--2"></div>
      <div class="bg-shape bg-shape--3"></div>
      <div class="bg-shape bg-shape--4"></div>
    </div>

    <div class="landing-content">
      <h1 class="landing-logo">QuizBattle</h1>
      <p class="landing-subtitle" data-i18n="landing.subtitle">สนุกกับการเรียนรู้แบบ Real-time!</p>

      <div class="landing-actions">
        <a href="/join.html" class="btn btn--primary btn--xl" data-i18n="landing.joinGame">เข้าร่วมเกม</a>
        <a href="/login.html" class="btn btn--secondary btn--lg" data-i18n="landing.hostLogin">เข้าสู่ระบบ (Host)</a>
      </div>
    </div>

    <footer class="landing-footer">
      <p data-i18n="landing.footer">QuizBattle &copy; 2026 - Powered by Learning &amp; Fun</p>
    </footer>
  </main>

  <script src="/js/i18n.js"></script>
</body>
</html>
