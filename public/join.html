<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapQuiz - เข้าร่วมเกม</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="join-page">

  <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">TH/EN</button>

  <main class="join-container">
    <div class="join-card">
      <h1 class="join-logo">ZapQuiz</h1>

      <div class="form-group">
        <label for="game-pin" data-i18n="join.pinLabel">Game PIN</label>
        <input type="text" id="game-pin" class="join-input join-input--pin" inputmode="numeric"
               maxlength="6" placeholder="000000" autocomplete="off"
               data-i18n-placeholder="join.pinPlaceholder">
      </div>

      <div class="form-group">
        <label for="nickname" data-i18n="join.nicknameLabel">ชื่อเล่น</label>
        <input type="text" id="nickname" class="join-input" maxlength="20"
               placeholder="ใส่ชื่อเล่นของคุณ" autocomplete="off"
               data-i18n-placeholder="join.nicknamePlaceholder">
      </div>

      <div class="form-group">
        <label data-i18n="join.chooseAvatar">เลือกตัวละคร</label>
        <div id="avatar-grid" class="avatar-grid">
          <button type="button" class="avatar-option" data-avatar="🐱">🐱</button>
          <button type="button" class="avatar-option" data-avatar="🐶">🐶</button>
          <button type="button" class="avatar-option" data-avatar="🐻">🐻</button>
          <button type="button" class="avatar-option" data-avatar="🐼">🐼</button>
          <button type="button" class="avatar-option" data-avatar="🦊">🦊</button>
          <button type="button" class="avatar-option" data-avatar="🐸">🐸</button>
          <button type="button" class="avatar-option" data-avatar="🐵">🐵</button>
          <button type="button" class="avatar-option" data-avatar="🐰">🐰</button>
          <button type="button" class="avatar-option" data-avatar="🐯">🐯</button>
          <button type="button" class="avatar-option" data-avatar="🦁">🦁</button>
          <button type="button" class="avatar-option" data-avatar="🐲">🐲</button>
          <button type="button" class="avatar-option" data-avatar="🦄">🦄</button>
          <button type="button" class="avatar-option" data-avatar="🐧">🐧</button>
          <button type="button" class="avatar-option" data-avatar="🐥">🐥</button>
          <button type="button" class="avatar-option" data-avatar="🦋">🦋</button>
          <button type="button" class="avatar-option" data-avatar="🐙">🐙</button>
          <button type="button" class="avatar-option" data-avatar="🦀">🦀</button>
          <button type="button" class="avatar-option" data-avatar="🐳">🐳</button>
          <button type="button" class="avatar-option" data-avatar="🦉">🦉</button>
          <button type="button" class="avatar-option" data-avatar="🐺">🐺</button>
        </div>
      </div>

      <button id="join-btn" class="btn btn--primary btn--xl btn--full" data-i18n="join.joinBtn">เข้าร่วม!</button>

      <div id="join-message" class="join-message" hidden></div>

      <a href="/" class="join-home-link" data-i18n="common.backHome">&larr; กลับหน้าหลัก</a>
    </div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/join.js"></script>
</body>
</html>
